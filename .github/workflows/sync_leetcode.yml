name: Sync LeetCode Submissions

on:
  workflow_dispatch: # Allows you to trigger it manually
  schedule:
    - cron: '0 0 * * *' # Automatically runs every day at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: 'Python-Solutions' # Puts them neatly into a folder
